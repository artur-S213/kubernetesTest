name: Deploy app to AKS with Namespace

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  

env:
  AZURE_CONFIG_DIR: /tmp/.azure
  DEPLOYMENT: pingpong
  IMAGE: pingpong
  BRANCH: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    # Check for ACR Password and Name.
    - name: Log in to Azure Container Registry
      run: |
        echo "${{ secrets.AZURE_ACR_PASSWORD }}" | docker login ${{ secrets.ACR_NAME }}.azurecr.io -u ${{ secrets.AZURE_ACR_USERNAME }} --password-stdin
    
    - name: Build and Push Docker image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE:$BRANCH-${{ github.sha }} .
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE:$BRANCH-${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    # - name: Set up Azure CLI
    #   uses: azure/CLI@v1
    #   with:
    #     azcliversion: 2.33.0
    #     inlineScript: |
    #       az login --service-principal -u 887f7420-def1-416b-8c68-c8615dce4cbe -p lYp8Q~BPaQbS9DDL4lpYJyOWyj0XpHTHndgeJcTJ --tenant 8caad09b-4487-48f9-b7d6-b47e22b2dd2f

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_SP_CREDENTIALS }}

    - name: Disable Azure CLI version check
      run: |            
        export AZURE_HTTP_USER_AGENT='None'

    # - name: Create Azure Config Directory
    #   run: |
    #     mkdir -p /home/runner/.azure
    #     chmod 755 /home/runner/.azure  
    
    - name: Get AKS credentials
      uses: azure/aks-set-context@v1
      with:
        creds: ${{ secrets.AZURE_SP_CREDENTIALS }}
        resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
        cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

    # - name: Get AKS Credentials
    #   run: |
    #     az aks get-credentials --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_NAME }} --admin
 
    - name: Deploy to AKS
      run: |
          kubectl create namespace $BRANCH || true 
          kubectl config set-context --current --namespace=$BRANCH
          kustomize edit set namespace $BRANCH
          kustomize edit set image $IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE:$BRANCH${{ github.sha }}
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment $DEPLOYMENT

